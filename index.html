<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisselgeld Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0c0c0c;
            --input-bg: #1e1e1e;
            --accent: #00ff9c;
            --btn-gray: #2e2e2e;
            --text: #ffffff;
            --label: #888;
        }

        body {
            margin: 0; font-family: sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .container { width: 90%; max-width: 400px; }
        #screen-calc { display: none; }
        
        h1 { text-align: center; color: var(--accent); font-size: 22px; font-weight: 800; margin-bottom: 15px; }
        .label { font-size: 11px; color: var(--label); margin-bottom: 5px; display: block; text-transform: uppercase; }

        /* HOME SCREEN */
        .table-display {
            background: var(--input-bg); padding: 15px; border-radius: 12px;
            text-align: center; font-size: 28px; font-weight: 800;
            color: var(--accent); margin-bottom: 15px; min-height: 35px;
        }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .numpad button { padding: 20px; font-size: 22px; background: var(--btn-gray); border-radius: 12px; color: white; }
        .btn-confirm { grid-column: span 3; background: var(--accent) !important; color: black !important; font-weight: bold; margin-top: 5px; }

        .active-list-title { margin-top: 25px; border-top: 1px solid #222; padding-top: 15px; }
        .active-tables-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .table-card {
            background: var(--input-bg); border: 1px solid var(--accent);
            padding: 12px; border-radius: 10px; text-align: left; cursor: pointer;
        }
        .table-card b { color: var(--accent); font-size: 16px; }
        .table-card span { display: block; font-size: 12px; color: #ccc; margin-top: 4px; }

        /* CALC SCREEN */
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .table-badge { background: var(--accent); color: black; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .btn-back { background: transparent; color: #ff4d4d; font-size: 13px; font-weight: bold; }

        input {
            width: 100%; background: var(--input-bg); border: none; border-radius: 12px;
            padding: 16px; color: #fff; font-size: 18px; outline: none; box-sizing: border-box;
        }

        .input-with-action { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn-plus { background: var(--accent); color: #000; border-radius: 12px; width: 55px; font-size: 22px; font-weight: bold; }

        .saved-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .chip { background: var(--btn-gray); padding: 6px 10px; border-radius: 8px; font-size: 12px; border: 1px solid #444; }

        .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .btn-main { background: var(--accent); color: #000; width: 100%; padding: 18px; font-weight: 700; border-radius: 12px; font-size: 16px; }

        .result { margin-top: 20px; background: var(--input-bg); padding: 15px; border-radius: 12px; display: none; border-left: 5px solid var(--accent); }
        .result.show { display: block; }
        
        .coin-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .coin-item { background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 15px; font-size: 12px; display: flex; align-items: center; border: 1px solid #333; }
        .dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
        .gold { background: #ffd700; } .silver { background: #c0c0c0; } .bronze { background: #cd7f32; }

        button { cursor: pointer; border: none; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="screen-home" class="container">
    <h1>Tafel Kiezen</h1>
    <div id="table-display" class="table-display">_</div>
    
    <div class="numpad">
        <button onclick="pressTable('1')">1</button>
        <button onclick="pressTable('2')">2</button>
        <button onclick="pressTable('3')">3</button>
        <button onclick="pressTable('4')">4</button>
        <button onclick="pressTable('5')">5</button>
        <button onclick="pressTable('6')">6</button>
        <button onclick="pressTable('7')">7</button>
        <button onclick="pressTable('8')">8</button>
        <button onclick="pressTable('9')">9</button>
        <button onclick="pressTable('clear')" style="color:#ff4d4d">C</button>
        <button onclick="pressTable('0')">0</button>
        <button onclick="goToCalc()" class="btn-confirm">NIEUWE TAFEL</button>
    </div>

    <div class="active-list-title"><span class="label">Actieve Tafels</span></div>
    <div id="active-tables" class="active-tables-grid"></div>
</div>

<div id="screen-calc" class="container">
    <div class="header-row">
        <button class="btn-back" onclick="handleBack()">← SLUIT TAFEL</button>
        <div id="active-table-badge" class="table-badge">Tafel 0</div>
    </div>

    <span class="label">Bedrag op rekening (€)</span>
    <div class="input-with-action">
        <input type="number" id="bill" placeholder="0,00" inputmode="decimal" oninput="autoSave()">
        <button class="btn-plus" onclick="saveQuickBill()">+</button>
    </div>

    <div id="savedBills" class="saved-chips"></div>

    <span class="label">Betaald door gast (€)</span>
    <input type="number" id="paid" placeholder="0,00" inputmode="decimal" style="margin-bottom:12px">

    <div class="quick-grid" id="quickButtons"></div>

    <button class="btn-main" onclick="calculate()">BEREKEN</button>

    <div id="result" class="result"></div>
</div>

<script>
    // --- STATE ---
    let currentTable = "";
    let activeOrders = JSON.parse(localStorage.getItem('active_orders') || '{}');
    let quickBills = JSON.parse(localStorage.getItem('quick_bills') || '[]');
    const cashOptions = [10, 20, 50, 100, 200];

    // --- HOME SCREEN ---
    function pressTable(num) {
        vibrate(10);
        if (num === 'clear') currentTable = "";
        else if (currentTable.length < 3) currentTable += num;
        document.getElementById('table-display').innerText = currentTable || "_";
    }

    function goToCalc(existingTable = null) {
        if (existingTable) currentTable = existingTable;
        if (!currentTable) return vibrate([40, 40]);

        vibrate(20);
        document.getElementById('active-table-badge').innerText = "Tafel " + currentTable;
        document.getElementById('bill').value = activeOrders[currentTable] || "";
        document.getElementById('paid').value = "";
        document.getElementById('result').classList.remove('show');

        document.getElementById('screen-home').style.display = "none";
        document.getElementById('screen-calc').style.display = "block";
    }

    function renderActiveTables() {
        const cont = document.getElementById('active-tables');
        cont.innerHTML = "";
        Object.keys(activeOrders).forEach(t => {
            const card = document.createElement('div');
            card.className = "table-card";
            card.innerHTML = `<b>Tafel ${t}</b><span>€ ${activeOrders[t]}</span>`;
            card.onclick = () => goToCalc(t);
            cont.appendChild(card);
        });
    }

    // --- CALC SCREEN ---
    function autoSave() {
        const val = document.getElementById('bill').value;
        if (val) activeOrders[currentTable] = val;
        else delete activeOrders[currentTable];
        localStorage.setItem('active_orders', JSON.stringify(activeOrders));
    }

    function handleBack() {
        vibrate(10);
        if (confirm("Tafel " + currentTable + " verwijderen uit actieve lijst?")) {
            delete activeOrders[currentTable];
            localStorage.setItem('active_orders', JSON.stringify(activeOrders));
        }
        currentTable = "";
        document.getElementById('table-display').innerText = "_";
        renderActiveTables();
        document.getElementById('screen-calc').style.display = "none";
        document.getElementById('screen-home').style.display = "block";
    }

    function saveQuickBill() {
        const val = document.getElementById('bill').value;
        if (val && !quickBills.includes(val)) {
            quickBills.push(parseFloat(val).toFixed(2));
            localStorage.setItem('quick_bills', JSON.stringify(quickBills));
            renderQuick();
            vibrate(30);
        }
    }

    function renderQuick() {
        const cont = document.getElementById('savedBills');
        cont.innerHTML = '';
        quickBills.forEach((amt, i) => {
            const c = document.createElement('div');
            c.className = 'chip'; c.innerText = '€' + amt;
            c.onclick = () => { document.getElementById('bill').value = amt; autoSave(); vibrate(10); };
            c.oncontextmenu = (e) => { 
                e.preventDefault(); 
                if(confirm('Wissen?')) { quickBills.splice(i, 1); localStorage.setItem('quick_bills', JSON.stringify(quickBills)); renderQuick(); }
            };
            cont.appendChild(c);
        });
    }

    function calculate() {
        const bill = parseFloat(document.getElementById('bill').value) || 0;
        const paid = parseFloat(document.getElementById('paid').value) || 0;
        const resDiv = document.getElementById('result');

        if (paid < bill) {
            vibrate([50, 50]);
            resDiv.innerHTML = `<b style="color:#ff4d4d">Te weinig betaald!</b>`;
            resDiv.classList.add('show');
            return;
        }

        vibrate(20);
        let roundedCents = Math.round(((paid - bill) * 100) / 5) * 5;
        const denoms = [5000, 2000, 1000, 500, 200, 100, 50, 20, 10, 5];
        const labels = ['€50', '€20', '€10', '€5', '€2', '€1', '50c', '20c', '10c', '5c'];
        
        let html = `<div style="font-size:32px; font-weight:800; color:var(--accent)">€${(roundedCents/100).toFixed(2)}</div><div class="coin-list">`;
        let temp = roundedCents;
        for (let i = 0; i < denoms.length; i++) {
            let count = Math.floor(temp / denoms[i]);
            if (count > 0) {
                let cl = denoms[i] >= 500 ? 'silver' : (denoms[i] >= 100 ? 'gold' : 'bronze');
                html += `<div class="coin-item"><span class="dot ${cl}"></span><b>${count}x</b>&nbsp;${labels[i]}</div>`;
                temp -= count * denoms[i];
            }
        }
        resDiv.innerHTML = html + `</div>`;
        resDiv.classList.add('show');
    }

    // --- SETUP ---
    function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
    const qb = document.getElementById('quickButtons');
    cashOptions.forEach(v => {
        const b = document.createElement('button');
        b.innerText = '€' + v;
        b.onclick = () => { vibrate(10); document.getElementById('paid').value = v.toFixed(2); calculate(); };
        qb.appendChild(b);
    });

    renderActiveTables();
    renderQuick();
</script>
</body>
</html>
