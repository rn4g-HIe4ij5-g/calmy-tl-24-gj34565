<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisselgeld & Food Pro</title>
    <style>
        :root {
            --bg: #0c0c0c;
            --input-bg: #1e1e1e;
            --accent: #00ff9c;
            --btn-gray: #262626;
            --text: #ffffff;
            --label: #888;
            --danger: #ff4d4d;
        }

        body {
            margin: 0; font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .container { width: 90%; max-width: 400px; padding: 10px; }
        
        .screen { display: none; }
        .screen.active { display: block; }

        h1 { text-align: center; color: var(--accent); font-size: 22px; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .label { font-size: 11px; color: var(--label); margin-bottom: 6px; display: block; text-transform: uppercase; font-weight: 600; }

        /* --- MAIN MENU --- */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .btn-menu { 
            background: var(--btn-gray); color: var(--text); border: 2px solid var(--accent);
            padding: 40px 20px; border-radius: 20px; font-size: 20px; font-weight: 800;
            text-transform: uppercase; cursor: pointer; text-align: center;
        }

        /* --- TIMER SCREEN --- */
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-food { 
            background: var(--btn-gray); border: 1px solid #444; color: white;
            padding: 15px 10px; border-radius: 12px; font-size: 14px; font-weight: 600;
        }
        
        .timer-card {
            background: var(--input-bg); border-left: 5px solid var(--accent);
            padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .timer-card.finished { border-left-color: var(--danger); animation: flash 1s infinite; }
        @keyframes flash { 50% { opacity: 0.5; } }
        .timer-time { font-size: 20px; font-weight: 800; color: var(--accent); }
        .timer-card.finished .timer-time { color: var(--danger); }

        /* --- WISSELGELD SCREENS --- */
        .table-display { background: var(--input-bg); padding: 20px; border-radius: 16px; text-align: center; font-size: 32px; font-weight: 800; color: var(--accent); margin-bottom: 20px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .numpad button { padding: 22px; font-size: 24px; background: var(--btn-gray); border-radius: 16px; color: white; font-weight: bold; }
        .btn-confirm { grid-column: span 3; background: var(--accent) !important; color: black !important; margin-top: 10px; }
        .active-tables-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 12px; }
        .table-card { background: var(--input-bg); border: 1px solid #333; padding: 15px; border-radius: 14px; }
        .table-card b { color: var(--accent); font-size: 16px; display: block; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-back { background: transparent; color: var(--accent); font-size: 13px; font-weight: 800; text-transform: uppercase; }

        input { width: 100%; background: var(--input-bg); border: 1px solid #333; border-radius: 14px; padding: 18px; color: #fff; font-size: 18px; outline: none; box-sizing: border-box; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-plus { background: var(--accent); color: #000; border-radius: 14px; width: 65px; font-size: 28px; font-weight: bold; }

        /* SPLIT SECTION */
        .split-box { background: #161616; border: 1px dashed #444; padding: 15px; border-radius: 14px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .split-controls { display: flex; align-items: center; gap: 10px; }
        .split-btn { background: var(--btn-gray); width: 35px; height: 35px; border-radius: 8px; font-size: 20px; color: white; display: flex; align-items: center; justify-content: center; }

        .saved-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .chip { background: var(--btn-gray); padding: 10px 14px; border-radius: 10px; font-size: 12px; border: 1px solid #444; }

        .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .quick-grid button { background: var(--btn-gray); color: #fff; padding: 15px; font-size: 16px; font-weight: 700; border-radius: 12px; border: 1px solid #3d3d3d; }
        
        .btn-main { background: var(--accent); color: #000; width: 100%; padding: 20px; font-weight: 800; border-radius: 16px; font-size: 18px; text-transform: uppercase; margin-top: 10px; }

        /* RESULTS */
        .result { margin-top: 25px; background: var(--input-bg); padding: 22px; border-radius: 18px; display: none; border-left: 6px solid var(--accent); }
        .result.show { display: block; }
        .coin-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .coin-item { background: rgba(255,255,255,0.06); padding: 12px 16px; border-radius: 14px; font-size: 16px; display: flex; align-items: center; border: 1px solid #333; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }
        .gold { background: #ffd700; } .silver { background: #c0c0c0; } .bronze { background: #cd7f32; }

        button { cursor: pointer; border: none; transition: transform 0.1s; }
        button:active { transform: scale(0.94); }
    </style>
</head>
<body>

<div id="screen-main" class="screen active container">
    <h1>Wisselgeld & Food</h1>
    <div class="menu-grid">
        <button class="btn-menu" onclick="showScreen('screen-timer')">🍳 Food Timer</button>
        <button class="btn-menu" onclick="showScreen('screen-home')">💶 Wisselgeld</button>
    </div>
</div>

<div id="screen-timer" class="screen container">
    <div class="header-row"><button class="btn-back" onclick="showScreen('screen-main')">← Menu</button></div>
    <h1>Food Timer</h1>
    <div class="timer-grid">
        <button class="btn-food" onclick="startTimer('Kipsaté', 7)">Kipsaté (7m)</button>
        <button class="btn-food" onclick="startTimer('Varkenshaas saté', 7)">Varkenshaas saté (7m)</button>
        <button class="btn-food" onclick="startTimer('Sparerib', 7)">Sparerib (7m)</button>
        <button class="btn-food" onclick="startTimer('Schnitzel', 3)">Schnitzel (3m)</button>
        <button class="btn-food" onclick="startTimer('Cordon Bleu', 7)">Cordon Bleu (7m)</button>
        <button class="btn-food" onclick="startTimer('Gamba\'s', 4)">Gamba's (4m)</button>
        <button class="btn-food" onclick="startTimer('Kip aan het spit', 10)">Kip aan spit (10m)</button>
        <button class="btn-food" onclick="startTimer('Varkenshaas med.', 7)">Varkenshaas med. (7m)</button>
    </div>
    <div id="active-timers"></div>
</div>

<div id="screen-home" class="screen container">
    <div class="header-row"><button class="btn-back" onclick="showScreen('screen-main')">← Menu</button></div>
    <h1>Tafel Kiezen</h1>
    <div id="table-display" class="table-display">_</div>
    <div class="numpad">
        <button onclick="pressTable('1')">1</button><button onclick="pressTable('2')">2</button><button onclick="pressTable('3')">3</button>
        <button onclick="pressTable('4')">4</button><button onclick="pressTable('5')">5</button><button onclick="pressTable('6')">6</button>
        <button onclick="pressTable('7')">7</button><button onclick="pressTable('8')">8</button><button onclick="pressTable('9')">9</button>
        <button onclick="pressTable('clear')" style="color:var(--danger)">C</button><button onclick="pressTable('0')">0</button>
        <button onclick="goToCalc()" class="btn-confirm">Verder</button>
    </div>
    <div class="active-list-title" style="margin-top:20px"><span class="label">Actieve Tafels</span></div>
    <div id="active-tables" class="active-tables-grid"></div>
</div>

<div id="screen-calc" class="screen container">
    <div class="header-row">
        <button class="btn-back" onclick="handleBack()">← Sluit Tafel</button>
        <div id="active-table-badge" class="table-badge" style="background:var(--accent); color:black; padding:5px 12px; border-radius:12px; font-weight:bold;">Tafel ?</div>
    </div>

    <span class="label">Bedrag op rekening (€)</span>
    <div class="input-row">
        <input type="number" id="bill" placeholder="0,00" inputmode="decimal" oninput="autoSave()">
        <button class="btn-plus" onclick="saveQuickBill()">+</button>
    </div>

    <div class="split-box">
        <div class="split-controls">
            <button class="split-btn" onclick="updateSplit(-1)">−</button>
            <span id="num-people" style="font-weight:bold; font-size: 18px;">1p</span>
            <button class="split-btn" onclick="updateSplit(1)">+</button>
        </div>
        <div class="split-info" onclick="useSplitAmount()" style="text-align:right; cursor:pointer">
            <span class="label" style="margin:0">Per persoon:</span>
            <b id="per-person-display" style="color:var(--accent); font-size:18px">€ 0.00</b>
        </div>
    </div>

    <div id="savedBills" class="saved-chips"></div>

    <span class="label">Betaald door gast (€)</span>
    <input type="number" id="paid" placeholder="0,00" inputmode="decimal" style="margin-bottom:12px">

    <div class="quick-grid" id="quickButtons"></div>

    <span class="label">Afronden naar? (Optioneel)</span>
    <input type="number" id="target" placeholder="bv. 50,00" inputmode="decimal" style="margin-bottom:12px" oninput="autoSave()">

    <button class="btn-main" onclick="calculate()">Bereken</button>
    <div id="result" class="result"></div>
</div>

<script>
    let runningTimers = [];
    let currentTable = "";
    let splitCount = 1;
    let activeOrders = JSON.parse(localStorage.getItem('active_orders_v7') || '{}');
    let quickBills = JSON.parse(localStorage.getItem('quick_bills_v7') || '[]');

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-home') renderActiveTables();
    }

    function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    // --- TIMERS ---
    function startTimer(dish, mins) {
        vibrate(20);
        runningTimers.push({ id: Date.now(), dish, endTime: Date.now() + (mins * 60 * 1000), finished: false });
        updateTimerUI();
    }
    function updateTimerUI() {
        const cont = document.getElementById('active-timers');
        cont.innerHTML = "";
        const now = Date.now();
        runningTimers.forEach(t => {
            const left = Math.max(0, Math.floor((t.endTime - now) / 1000));
            if (left === 0 && !t.finished) { t.finished = true; vibrate([500, 200, 500, 200, 500]); }
            const card = document.createElement('div');
            card.className = `timer-card ${left === 0 ? 'finished' : ''}`;
            card.innerHTML = `<div><div style="font-weight:bold">${t.dish}</div><div class="timer-time">${Math.floor(left/60)}:${(left%60).toString().padStart(2,'0')}</div></div>
                              <button onclick="removeTimer(${t.id})" style="background:var(--danger); color:white; padding:10px; border-radius:10px">OK</button>`;
            cont.appendChild(card);
        });
    }
    function removeTimer(id) { runningTimers = runningTimers.filter(t => t.id !== id); updateTimerUI(); }
    setInterval(updateTimerUI, 1000);

    // --- WISSELGELD ---
    function pressTable(num) {
        vibrate(10);
        if (num === 'clear') currentTable = "";
        else if (currentTable.length < 3) currentTable += num;
        document.getElementById('table-display').innerText = currentTable || "_";
    }

    function goToCalc(existingTable = null) {
        if (existingTable) currentTable = existingTable;
        if (!currentTable) return;
        vibrate(20);
        document.getElementById('active-table-badge').innerText = "Tafel " + currentTable;
        const data = activeOrders[currentTable] || {bill: "", target: "", split: 1};
        document.getElementById('bill').value = data.bill || "";
        document.getElementById('target').value = data.target || "";
        splitCount = data.split || 1;
        updateSplit(0);
        document.getElementById('paid').value = "";
        document.getElementById('result').classList.remove('show');
        showScreen('screen-calc');
    }

    function renderActiveTables() {
        const cont = document.getElementById('active-tables');
        cont.innerHTML = "";
        Object.keys(activeOrders).forEach(t => {
            const card = document.createElement('div');
            card.className = "table-card";
            card.innerHTML = `<b style="color:var(--accent)">Tafel ${t}</b><span>€ ${activeOrders[t].bill}</span>`;
            card.onclick = () => goToCalc(t);
            cont.appendChild(card);
        });
    }

    function updateSplit(val) {
        splitCount = Math.max(1, splitCount + val);
        document.getElementById('num-people').innerText = splitCount + "p";
        const bill = parseFloat(document.getElementById('bill').value) || 0;
        document.getElementById('per-person-display').innerText = "€ " + (bill / splitCount).toFixed(2);
        autoSave();
    }

    function useSplitAmount() {
        const perPerson = (parseFloat(document.getElementById('bill').value) || 0) / splitCount;
        document.getElementById('bill').value = perPerson.toFixed(2);
        splitCount = 1; updateSplit(0);
    }

    function autoSave() {
        const b = document.getElementById('bill').value;
        const t = document.getElementById('target').value;
        if (b || t || splitCount > 1) activeOrders[currentTable] = { bill: b, target: t, split: splitCount };
        else delete activeOrders[currentTable];
        localStorage.setItem('active_orders_v7', JSON.stringify(activeOrders));
    }

    function handleBack() {
        if (confirm("Tafel " + currentTable + " verwijderen?")) {
            delete activeOrders[currentTable];
            localStorage.setItem('active_orders_v7', JSON.stringify(activeOrders));
        }
        showScreen('screen-home');
    }

    function saveQuickBill() {
        const input = document.getElementById('bill');
        if (input.value && !quickBills.includes(input.value)) {
            quickBills.push(parseFloat(input.value).toFixed(2));
            localStorage.setItem('quick_bills_v7', JSON.stringify(quickBills));
            renderQuick(); vibrate(30); input.value = ''; autoSave();
        }
    }

    function renderQuick() {
        const cont = document.getElementById('savedBills');
        cont.innerHTML = '';
        quickBills.forEach((amt, i) => {
            const c = document.createElement('div');
            c.className = 'chip'; c.innerText = '€' + amt;
            c.onclick = () => { document.getElementById('bill').value = amt; updateSplit(0); vibrate(10); };
            c.oncontextmenu = (e) => { e.preventDefault(); if(confirm('Wissen?')) { quickBills.splice(i, 1); localStorage.setItem('quick_bills_v7', JSON.stringify(quickBills)); renderQuick(); } };
            cont.appendChild(c);
        });
    }

    function calculate() {
        const bill = parseFloat(document.getElementById('bill').value) || 0;
        const paid = parseFloat(document.getElementById('paid').value) || 0;
        const target = parseFloat(document.getElementById('target').value);
        const resDiv = document.getElementById('result');
        if (paid < bill && isNaN(target)) { vibrate([50, 50]); return; }
        vibrate(20);
        let changeCents = !isNaN(target) ? Math.round((paid - target) * 100) : Math.round((paid - bill) * 100);
        let tipCents = !isNaN(target) ? Math.round((target - bill) * 100) : 0;
        let rounded = Math.round(changeCents / 5) * 5;
        const denoms = [5000, 2000, 1000, 500, 200, 100, 50, 20, 10, 5];
        const labels = ['50 euro', '20 euro', '10 euro', '5 euro', '2 euro', '1 euro', '50 cent', '20 cent', '10 cent', '5 cent'];
        let html = `<div style="font-size:32px; font-weight:800; color:var(--accent)">€${(rounded/100).toFixed(2)}</div><div class="coin-list">`;
        let temp = rounded;
        for (let i = 0; i < denoms.length; i++) {
            let count = Math.floor(temp / denoms[i]);
            if (count > 0) {
                let cl = denoms[i] >= 500 ? 'silver' : (denoms[i] >= 100 ? 'gold' : 'bronze');
                html += `<div class="coin-item"><span class="dot ${cl}"></span><b>${count}x</b>&nbsp;${labels[i]}</div>`;
                temp -= count * denoms[i];
            }
        }
        if(!isNaN(target)) html += `</div><div style="margin-top:15px; font-size:14px; color:#ffd166; font-weight:bold;">Fooi: €${(tipCents/100).toFixed(2)}</div>`;
        else html += "</div>";
        resDiv.innerHTML = html; resDiv.classList.add('show');
    }

    const qb = document.getElementById('quickButtons');
    [10, 20, 50, 100, 200].forEach(v => {
        const b = document.createElement('button');
        b.innerText = '€' + v;
        b.onclick = () => { vibrate(10); document.getElementById('paid').value = v.toFixed(2); calculate(); };
        qb.appendChild(b);
    });
    renderQuick();
</script>
</body>
</html>
