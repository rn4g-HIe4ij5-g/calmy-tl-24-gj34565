<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisselgeld Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #00ff9c;
            --tip: #ffd166;
            --btn: #2e2e2e;
            --text: #ffffff;
            --border: #333;
        }

        /* Auto-Night Mode: Inverts colors in bright daylight for better visibility */
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f0f2f5;
                --card: #ffffff;
                --btn: #e0e0e0;
                --text: #121212;
                --border: #ccc;
            }
        }

        body {
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 92%;
            max-width: 360px;
        }

        h1 {
            text-align: center;
            font-size: 1rem;
            letter-spacing: 2px;
            opacity: 0.5;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            padding-left: 5px;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            border: 2px solid transparent;
            border-radius: 14px;
            background: var(--card);
            color: var(--text);
            box-sizing: border-box;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn-add {
            background: var(--accent);
            color: #000;
            width: 60px;
            font-size: 24px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .saved-bills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        button {
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background: var(--btn);
            color: var(--text);
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        button:active {
            transform: scale(0.92);
            filter: brightness(1.2);
        }

        .bill-chip {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px 12px;
            font-size: 13px;
        }

        .btn-calc {
            width: 100%;
            background: var(--accent);
            color: #000;
            font-size: 18px;
            margin-top: 10px;
            padding: 18px;
        }

        .result {
            margin-top: 20px;
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            display: none;
            border-left: 6px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .result.show {
            display: block;
            animation: slideUp 0.2s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .coin-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .coin-item {
            background: rgba(128,128,128,0.1);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .silver { background: #c0c0c0; box-shadow: 0 0 5px #c0c0c0; }
        .gold { background: #ffd700; box-shadow: 0 0 5px #ffd700; }
        .bronze { background: #cd7f32; box-shadow: 0 0 5px #cd7f32; }

        .history {
            margin-top: 30px;
            padding: 15px;
            font-size: 12px;
            color: #888;
            text-align: center;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Wisselgeld Pro</h1>

    <label>Te betalen bedrag</label>
    <div class="input-row">
        <input type="number" step="0.01" id="bill" placeholder="0.00" inputmode="decimal">
        <button class="btn-add" onclick="saveBill()">+</button>
    </div>

    <div id="savedBills" class="saved-bills"></div>

    <label>Betaald door gast</label>
    <input type="number" step="0.01" id="paid" placeholder="0.00" inputmode="decimal">

    <div class="quick-grid" id="quickButtons"></div>

    <button class="btn-calc" onclick="calculate()">BEREKEN WISSELGELD</button>

    <div class="result" id="result"></div>
    <div class="history" id="history">Nog geen berekeningen</div>
</div>

<script>
    const quickValues = [10, 20, 50, 100];
    const qb = document.getElementById('quickButtons');
    let savedBills = JSON.parse(localStorage.getItem('saved_bills') || '[]');

    // Initialize Quick Cash Buttons
    quickValues.forEach(v => {
        const b = document.createElement('button');
        b.innerText = '€' + v;
        b.onclick = () => {
            vibrate(15);
            document.getElementById('paid').value = v.toFixed(2);
            calculate();
        };
        qb.appendChild(b);
    });

    // Vibrate Helper (Idea #8)
    function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    // Save Bill Logic (New Feature)
    function saveBill() {
        const val = document.getElementById('bill').value;
        if (val && !savedBills.includes(val)) {
            savedBills.push(parseFloat(val).toFixed(2));
            localStorage.setItem('saved_bills', JSON.stringify(savedBills));
            renderSavedBills();
            vibrate(30);
        }
    }

    function renderSavedBills() {
        const container = document.getElementById('savedBills');
        container.innerHTML = '';
        savedBills.forEach((amt, i) => {
            const b = document.createElement('button');
            b.className = 'bill-chip';
            b.innerText = '€' + amt;
            b.onclick = () => {
                document.getElementById('bill').value = amt;
                vibrate(10);
            };
            // Long press to delete
            let timer;
            b.ontouchstart = b.onmousedown = () => {
                timer = setTimeout(() => {
                    if(confirm('Verwijder €' + amt + '?')) {
                        savedBills.splice(i, 1);
                        localStorage.setItem('saved_bills', JSON.stringify(savedBills));
                        renderSavedBills();
                    }
                }, 800);
            };
            b.ontouchend = b.onmouseup = () => clearTimeout(timer);
            container.appendChild(b);
        });
    }

    // Calculation Logic
    function calculate() {
        const billInput = document.getElementById('bill').value;
        const paidInput = document.getElementById('paid').value;
        const resDiv = document.getElementById('result');
        const histDiv = document.getElementById('history');

        if (!billInput || !paidInput) return;

        const bill = parseFloat(billInput);
        const paid = parseFloat(paidInput);

        if (paid < bill) {
            vibrate([50, 100, 50]);
            resDiv.innerHTML = `<b style="color:#ff4d4d">Te weinig betaald! (€${(bill - paid).toFixed(2)} tekort)</b>`;
            resDiv.className = "result show";
            return;
        }

        vibrate(20);

        // Dutch Rounding (Idea #4)
        let rawChange = paid - bill;
        let roundedChange = Math.round(rawChange * 20) / 20;
        let cents = Math.round(roundedChange * 100);

        const denoms = [5000, 2000, 1000, 500, 200, 100, 50, 20, 10, 5];
        const labels = ['€50', '€20', '€10', '€5', '€2', '€1', '50c', '20c', '10c', '5c'];
        
        let html = `<div style="font-size:12px; color:#888; margin-bottom:4px;">TERUG TE GEVEN:</div>`;
        html += `<div style="font-size:32px; font-weight:bold; color:var(--accent)">€${roundedChange.toFixed(2)}</div>`;
        html += `<div class="coin-list">`;

        let tempCents = cents;
        for (let i = 0; i < denoms.length; i++) {
            let count = Math.floor(tempCents / denoms[i]);
            if (count > 0) {
                let color = denoms[i] >= 500 ? 'silver' : (denoms[i] >= 100 ? 'gold' : 'bronze');
                html += `<div class="coin-item"><span class="dot ${color}"></span><b>${count}x</b>&nbsp;${labels[i]}</div>`;
                tempCents -= count * denoms[i];
            }
        }
        html += `</div>`;

        // History (Idea #10)
        histDiv.innerHTML = `Laatst: €${bill.toFixed(2)} → €${paid.toFixed(2)} (Terug: €${roundedChange.toFixed(2)})`;

        resDiv.innerHTML = html;
        resDiv.className = "result show";
    }

    // Initial Load
    renderSavedBills();
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>

</body>
</html>
