<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisselgeld Calculator</title>
<link rel="manifest" href="manifest.json">
<style>
body{margin:0;font-family:Arial;background:#121212;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.container{width:95%;max-width:420px}
h1{text-align:center;margin-bottom:20px}
input{width:100%;padding:18px;margin-bottom:15px;font-size:22px;border:none;border-radius:12px;background:#1e1e1e;color:#fff}
.option{display:flex;gap:10px;margin-bottom:10px}
.quick-buttons{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
button{flex:1;padding:18px;font-size:20px;border:none;border-radius:12px;background:#2e2e2e;color:#fff;cursor:pointer}
.result{margin-top:20px;background:#1e1e1e;padding:20px;border-radius:12px;font-size:20px;opacity:0;transform:translateY(10px);transition:.25s}
.result.show{opacity:1;transform:translateY(0)}
.result.change-mode{border:2px solid #00ff9c}
.result.tip-mode{border:2px solid #ffd166;background:#2a2412}
.highlight{font-size:28px;margin-bottom:10px;color:#00ff9c}
.tip{color:#ffd166;font-size:22px;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<h1>Wisselgeld</h1>
<input type="number" step="0.01" id="bill" placeholder="Rekening (€)">
<input type="number" step="0.01" id="paid" placeholder="Betaald (€)">
<input type="number" step="0.01" id="target" placeholder="Gast zegt: maak er (€...) van">
<div class="option">
<input type="checkbox" id="tipMode"><label>Fooi (geen wisselgeld)</label>
</div>
<div class="quick-buttons" id="quickButtons"></div>
<button onclick="calculateChange()">Bereken</button>
<div class="result" id="result"></div>
</div>
<script>
const quickValues=[10,20,50,100,200];
function initButtons(){
const c=document.getElementById('quickButtons');
quickValues.forEach(v=>{
const b=document.createElement('button');
b.innerText='€'+v;
b.onclick=()=>setPaid(v);
c.appendChild(b);
});}
function setPaid(a){document.getElementById('paid').value=a.toFixed(2);calculateChange();}
function round5(c){return Math.round(c/5)*5;}
function calculateChange(){
const bill=parseFloat(document.getElementById('bill').value);
const paid=parseFloat(document.getElementById('paid').value);
const target=parseFloat(document.getElementById('target').value);
const tipMode=document.getElementById('tipMode').checked;
const result=document.getElementById('result');
result.classList.remove('tip-mode','change-mode');
if(isNaN(bill)||isNaN(paid)){result.classList.remove('show');return;}
let changeCents=0;
let tipCents=0;
let useTarget=!isNaN(target);
if(useTarget){tipCents=Math.round((target-bill)*100);changeCents=Math.round((paid-target)*100);}else{changeCents=Math.round((paid-bill)*100);}
if(changeCents<0){result.innerHTML='<div class="highlight">Te weinig betaald</div>';result.classList.add('show');return;}
if(tipMode){const tip=(paid-bill).toFixed(2);result.innerHTML='<div class="highlight">Geen wisselgeld</div><div class="tip">Fooi: €'+tip+'</div>';result.classList.add('show','tip-mode');return;}
let change=round5(changeCents);
const den=[2000,1000,500,200,100,50,20,10,5];
const lab=['€20','€10','€5','€2','€1','50c','20c','10c','5c'];
let out=[];
for(let i=0;i<den.length;i++){let count=Math.floor(change/den[i]);if(count>0){out.push(count+'x '+lab[i]);change-=count*den[i];}}
const changeEuro=(changeCents/100).toFixed(2);
let html='<div class="highlight">€'+changeEuro+'</div>';
html+='<div>Pak: '+out.join(', ')+'</div>';
if(useTarget){html+='<div class="tip">Fooi: €'+(tipCents/100).toFixed(2)+'</div>';}
result.innerHTML=html;
result.classList.add('show','change-mode');
}

// TESTS
function runTests(){
console.log('Test 1');
let bill=76.35,paid=100,target=82.50;
console.log('Change should be 17.50:',(paid-target).toFixed(2));
console.log('Tip should be 6.15:',(target-bill).toFixed(2));

console.log('Test 2 (no target)');
console.log('Change 100-50=50:',(100-50).toFixed(2));

console.log('Test 3 (exact payment)');
console.log('Change 0:',(50-50).toFixed(2));
}
runTests();

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
initButtons();
</script>
</body>
</html>
