<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisselgeld App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0c0c0c;
            --input-bg: #1e1e1e;
            --accent: #00ff9c;
            --btn-gray: #2e2e2e;
            --text: #ffffff;
            --label: #888;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            width: 90%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            font-size: 24px;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .label {
            font-size: 12px;
            color: var(--label);
            margin-bottom: 6px;
            display: block;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-with-action {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            padding: 18px;
            color: #fff;
            font-size: 18px;
            outline: none;
        }

        /* The "+" button to save bills */
        .btn-plus {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            width: 55px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .saved-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .chip {
            background: var(--btn-gray);
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            background: var(--btn-gray);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        .btn-main {
            background: var(--accent);
            color: #000;
            width: 100%;
            font-size: 18px;
            padding: 20px;
            margin-top: 20px;
            font-weight: 700;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            font-size: 14px;
            color: var(--label);
        }

        .result {
            margin-top: 25px;
            background: var(--input-bg);
            padding: 20px;
            border-radius: 15px;
            display: none;
            border-left: 5px solid var(--accent);
        }

        .result.show { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        /* Visual Coins Styles */
        .coin-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .coin-item {
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            border: 1px solid #333;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
        .gold { background: #ffd700; }
        .silver { background: #c0c0c0; }
        .bronze { background: #cd7f32; }

        .history {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: 30px;
            border-top: 1px solid #222;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Wisselgeld</h1>

    <span class="label">Te betalen bedrag (€)</span>
    <div class="input-group input-with-action">
        <input type="number" id="bill" placeholder="0,00" inputmode="decimal">
        <button class="btn-plus" onclick="saveBill()">+</button>
    </div>

    <div id="savedBills" class="saved-chips"></div>

    <span class="label">Betaald door gast (€)</span>
    <div class="input-group">
        <input type="number" id="paid" placeholder="0,00" inputmode="decimal">
    </div>

    <div class="quick-grid" id="quickButtons"></div>

    <span class="label">Afronden naar? (Optioneel)</span>
    <div class="input-group">
        <input type="number" id="target" placeholder="bv. 50,00" inputmode="decimal">
    </div>

    <div class="checkbox-row">
        <input type="checkbox" id="tipMode"> Volledig fooi (geen wisselgeld)
    </div>

    <button class="btn-main" onclick="calculate()">Bereken Wisselgeld</button>

    <div id="result" class="result"></div>
    <div id="history" class="history"></div>
</div>

<script>
    const quickValues = [10, 20, 50, 100, 200];
    let savedBills = JSON.parse(localStorage.getItem('saved_bills') || '[]');

    // Setup Quick Buttons
    const qb = document.getElementById('quickButtons');
    quickValues.forEach(v => {
        const b = document.createElement('button');
        b.innerText = '€' + v;
        b.onclick = () => {
            vibrate(10);
            document.getElementById('paid').value = v.toFixed(2);
            calculate();
        };
        qb.appendChild(b);
    });

    function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    function saveBill() {
        const val = document.getElementById('bill').value;
        if (val && !savedBills.includes(val)) {
            savedBills.push(parseFloat(val).toFixed(2));
            localStorage.setItem('saved_bills', JSON.stringify(savedBills));
            renderSaved();
            vibrate(30);
        }
    }

    function renderSaved() {
        const cont = document.getElementById('savedBills');
        cont.innerHTML = '';
        savedBills.forEach((amt, i) => {
            const c = document.createElement('div');
            c.className = 'chip';
            c.innerText = '€' + amt;
            c.onclick = () => { document.getElementById('bill').value = amt; vibrate(10); };
            c.oncontextmenu = (e) => { 
                e.preventDefault(); 
                if(confirm('Wissen?')) { savedBills.splice(i, 1); localStorage.setItem('saved_bills', JSON.stringify(savedBills)); renderSaved(); }
            };
            cont.appendChild(c);
        });
    }

    function calculate() {
        const bill = parseFloat(document.getElementById('bill').value) || 0;
        const paid = parseFloat(document.getElementById('paid').value) || 0;
        const target = parseFloat(document.getElementById('target').value);
        const isTipOnly = document.getElementById('tipMode').checked;
        const resDiv = document.getElementById('result');

        if (paid < bill && !isTipOnly) {
            vibrate([50, 50]);
            resDiv.innerHTML = `<b style="color:#ff4d4d">Te weinig betaald!</b>`;
            resDiv.className = "result show";
            return;
        }

        vibrate(20);
        let changeCents = 0;
        let tipCents = 0;
        let useTarget = !isNaN(target);

        if (isTipOnly) {
            resDiv.innerHTML = `<div style="color:var(--accent); font-size:20px; font-weight:bold;">Alles is fooi!</div><div style="margin-top:10px">Bedrag: €${(paid-bill).toFixed(2)}</div>`;
            resDiv.className = "result show";
            return;
        }

        if (useTarget) {
            tipCents = Math.round((target - bill) * 100);
            changeCents = Math.round((paid - target) * 100);
        } else {
            changeCents = Math.round((paid - bill) * 100);
        }

        // 5-cent Dutch Rounding
        let roundedCents = Math.round(changeCents / 5) * 5;
        
        const denoms = [5000, 2000, 1000, 500, 200, 100, 50, 20, 10, 5];
        const labels = ['€50', '€20', '€10', '€5', '€2', '€1', '50c', '20c', '10c', '5c'];
        
        let html = `<div style="font-size:12px; color:#888; margin-bottom:5px;">TERUGGEVEN:</div>`;
        html += `<div style="font-size:32px; font-weight:800; color:var(--accent)">€${(roundedCents/100).toFixed(2)}</div>`;
        
        html += `<div class="coin-list">`;
        let temp = roundedCents;
        for (let i = 0; i < denoms.length; i++) {
            let count = Math.floor(temp / denoms[i]);
            if (count > 0) {
                let cl = denoms[i] >= 500 ? 'silver' : (denoms[i] >= 100 ? 'gold' : 'bronze');
                html += `<div class="coin-item"><span class="dot ${cl}"></span><b>${count}x</b>&nbsp;${labels[i]}</div>`;
                temp -= count * denoms[i];
            }
        }
        html += `</div>`;

        if (useTarget) html += `<div style="margin-top:15px; font-size:14px; color:#ffd166">Fooi: €${(tipCents/100).toFixed(2)}</div>`;

        document.getElementById('history').innerText = `Laatst: €${bill.toFixed(2)} met €${paid.toFixed(2)}`;
        resDiv.innerHTML = html;
        resDiv.className = "result show";
    }

    renderSaved();
</script>
</body>
</html>
